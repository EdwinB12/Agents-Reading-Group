name: Link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline **/*.md
          fail: true
